name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # Lint & Typecheck
  # ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck Packages
        run: |
          cd packages/types && npx tsc --noEmit
          cd $GITHUB_WORKSPACE/packages/config && npx tsc --noEmit
          cd $GITHUB_WORKSPACE/packages/sdk && npx tsc --noEmit

      - name: Typecheck API
        run: cd apps/api && npx tsc --noEmit

      - name: Typecheck Indexer
        run: cd apps/indexer && npx tsc --noEmit

      - name: Typecheck Web
        run: cd apps/web && npx tsc --noEmit

  # ──────────────────────────────────────────
  # Contract Tests
  # ──────────────────────────────────────────
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Compile contracts
        run: cd contracts && npx hardhat compile

      - name: Run tests
        run: cd contracts && npx hardhat test

      - name: Check coverage
        run: cd contracts && npx hardhat coverage || true

  # ──────────────────────────────────────────
  # Frontend Build
  # ──────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd apps/web && npx next build
        env:
          NEXT_PUBLIC_CHAIN_ID: "43113"
          NEXT_PUBLIC_RPC_URL: "https://api.avax-test.network/ext/bc/C/rpc"
          NEXT_PUBLIC_API_URL: "http://localhost:3001"
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: "test-ci-build"

  # ──────────────────────────────────────────
  # API Build
  # ──────────────────────────────────────────
  build-api:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build API
        run: cd apps/api && npx tsc

  # ──────────────────────────────────────────
  # Deploy (only on main push)
  # ──────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [contracts, build-web, build-api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy placeholder
        run: echo "🔺 Deployment step — configure Vercel/Railway/Fly here"
